<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 STUDIOS | High-End Portfolio</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFD700">
<link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/MTs324rX/IMG-20260317-190541.png">
<link rel="icon" type="image/png" href="https://i.postimg.cc/MTs324rX/IMG-20260317-190541.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
* { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
body { font-family: 'Poppins', 'Cairo', sans-serif; background: #0a0a0a; color: white; text-align: center; overflow-x: hidden; }
#bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

.online-counter { 
  position: absolute; top: 15px; left: 15px; 
  background: rgba(255, 215, 0, 0.15); border: 1px solid gold; 
  padding: 5px 15px; border-radius: 20px; color: gold; 
  font-weight: bold; font-size: 14px; backdrop-filter: blur(10px); z-index: 2000; 
}

#login-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center;
}
.login-card {
  background: rgba(15, 15, 15, 0.95); padding: 40px; border-radius: 25px;
  border: 1px solid gold; text-align: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
  width: 90%; max-width: 400px;
}
.name-input {
  width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid gold;
  background: #1a1a1a; color: white; margin-top: 20px; outline: none; text-align: center;
  font-family: 'Cairo', sans-serif; user-select: auto;
}
.entry-btn {
  background: gold; color: #000; padding: 12px 30px; border-radius: 30px;
  border: none; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%;
}

.lang-switcher {
  position: absolute; top: 15px; right: 15px; z-index: 2000;
  background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 215, 0, 0.3);
  padding: 8px 15px; border-radius: 30px; backdrop-filter: blur(10px); display: flex; gap: 15px; align-items: center;
}
.lang-flag { width: 28px; height: 28px; cursor: pointer; border-radius: 50%; transition: 0.3s; }
.lang-flag.active { border-color: gold; box-shadow: 0 0 8px gold; }

.header {
  padding: 50px 20px 30px; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
  border-bottom: 2px solid rgba(255, 215, 0, 0.3); display: flex; justify-content: center; align-items: center; gap: 20px;
}
.logo-img { width: 100px; height: 100px; border: 4px solid #FFD700; border-radius: 15px; background-color: #000; padding: 10px; }
.logo-text { font-size: 38px; font-weight: 700; color: gold; text-shadow: 0 0 15px rgba(255, 215, 0, 0.7); }

.images { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 700px; margin: auto; padding: 30px 20px 50px 20px; }
.images img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 18px; cursor: pointer; border: 2px solid rgba(255, 215, 0, 0.3); }

.popup {
  display: none; position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.97); backdrop-filter: blur(25px);
  justify-content:center; align-items:center; flex-direction: column; z-index:1500; opacity: 0; transition: opacity 0.5s;
}
.img-area { position:relative; width: 90%; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
.popup img { width: 100%; border-radius: 20px; border: 3px solid gold; pointer-events: none; }
#swipe-protection { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

.big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; color: gold; opacity: 0; z-index: 11; pointer-events: none; }
.big-heart.show { animation: heartPop 0.8s forwards; }
@keyframes heartPop { 0% {opacity:0; transform: translate(-50%, -50%) scale(0.5);} 50% {opacity:1; transform: translate(-50%, -50%) scale(1.4);} 100% {opacity:0; transform: translate(-50%, -50%) scale(1);} }

.actions { display: flex; gap: 30px; align-items: center; margin-top: 15px; padding: 10px 30px; background: rgba(255, 255, 255, 0.08); border-radius: 50px; border: 1px solid rgba(255,215,0,0.4); z-index: 20; }
.actions i { font-size: 28px; cursor: pointer; color: white; }
.fa-heart.liked { color: red !important; }
.like-display { color: gold; font-weight: bold; font-size: 18px; margin-left: -20px; }
.close-btn { position:absolute; top:20px; right:25px; font-size:45px; color: gold; cursor:pointer; z-index: 1600; }

.comments-container { width: 100%; margin-top: 15px; background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 10px; border: 1px solid rgba(255, 215, 0, 0.2); z-index: 20; }
.comments-list { height: 52px; overflow-y: auto; margin-bottom: 10px; text-align: left; }
.comment-item { font-size: 13px; color: #eee; padding: 4px 8px; border-bottom: 1px solid rgba(255, 215, 0, 0.1); }
.comment-user-name { color: gold; font-weight: bold; margin-right: 5px; }

.comment-input-area { display: flex; gap: 8px; }
.comment-input-area input { flex: 1; background: #1a1a1a; border: 1px solid gold; border-radius: 20px; padding: 5px 15px; color: white; outline: none; user-select: auto; }
.comment-input-area button { background: gold; border: none; border-radius: 20px; padding: 5px 15px; cursor: pointer; font-weight: bold; color: black; }

.contact { margin-top:80px; padding:80px 20px; background: linear-gradient(to top, #000, #0a0a0a); border-top: 2px solid rgba(255, 215, 0, 0.2); }
.social-btn { text-decoration: none; padding: 18px 40px; border-radius: 50px; font-weight: 700; display: flex; align-items: center; gap: 12px; border: 1px solid gold; font-size: 18px; }
.insta-btn { color: #E1306C; border-color: #E1306C; }
.wa-btn { color: #25D366; border-color: #25D366; }
</style>
</head>
<body oncontextmenu="return false;">

<div class="online-counter"><i class="fas fa-users"></i> <span id="online-count">---</span> Online</div>

<div id="login-overlay">
  <div class="login-card animate__animated animate__zoomIn">
    <img src="https://i.postimg.cc/MTs324rX/IMG-20260317-190541.png" style="width: 80px; border: 2px solid gold; border-radius: 12px; margin-bottom: 10px;">
    <h2 style="color: gold;">7 STUDIOS</h2>
    <p style="color: #ccc; font-size: 14px;">Please enter your first and last name</p>
    <input type="text" id="user-full-name" class="name-input" placeholder="Name here...">
    <button class="entry-btn" onclick="enterSite()">Enter</button>
  </div>
</div>

<div class="lang-switcher" id="langSwitcher">
  <img src="https://flagcdn.com/w80/us.png" class="lang-flag active" id="flag-en" onclick="changeLang('en', this)">
  <img src="https://flagcdn.com/w80/es.png" class="lang-flag" onclick="changeLang('es', this)">
  <img src="https://flagcdn.com/w80/eg.png" class="lang-flag" onclick="changeLang('ar', this)">
</div>

<canvas id="bg-canvas"></canvas>

<header class="header">
  <img src="https://i.postimg.cc/MTs324rX/IMG-20260317-190541.png" class="logo-img">
  <h1 class="logo-text">7 STUDIOS</h1>
</header>

<section>
  <h2 id="section-title" style="color: gold; font-size: 32px; margin-top: 50px; letter-spacing: 3px;">DESIGNS</h2>
  <div class="images" id="gallery"></div>
</section>

<div class="popup" id="popup">
  <span class="close-btn" onclick="closeImage()">×</span>
  <div class="img-area">
    <div id="swipe-protection"></div>
    <img id="popup-img" draggable="false">
    <i class="fas fa-heart big-heart" id="bigHeart"></i>
    <div class="comments-container">
      <div class="comments-list" id="commentsList"></div>
      <div class="comment-input-area">
        <input type="text" id="commentInput" placeholder="Add a comment...">
        <button id="post-btn" onclick="addComment()">Post</button>
      </div>
    </div>
  </div>
  <div class="actions">
    <i class="fas fa-heart" id="likeBtn" onclick="toggleLike()"></i>
    <span class="like-display" id="likeCountDisplay">0</span>
    <i class="fas fa-download" style="color:#00ff88;" onclick="downloadImage()"></i>
    <i class="fas fa-share-alt" onclick="shareImage()"></i>
  </div>
</div>

<footer class="contact">
  <h2 id="contact-title" style="color: gold; font-size: 32px; margin-bottom: 35px;">Contact Us</h2>
  <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">
    <a href="https://instagram.com/im_7amza_7" target="_blank" class="social-btn insta-btn"><i class="fab fa-instagram"></i> Instagram</a>
    <a href="https://wa.me/201221109955" target="_blank" class="social-btn wa-btn"><i class="fab fa-whatsapp"></i> WhatsApp</a>
  </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA7AujCYTlmLyw9vaEEfWXxDqsd_LF_zWU",
  authDomain: "studios-dffdd.firebaseapp.com",
  databaseURL: "https://studios-dffdd-default-rtdb.firebaseio.com",
  projectId: "studios-dffdd",
  storageBucket: "studios-dffdd.firebasestorage.app",
  messagingSenderId: "760995591996",
  appId: "1:760995591996:web:889097b58f5ddf54465039"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let currentUser = null;
let currentLang = 'en';

// الكود يبدأ من هنا
window.onload = () => {
    changeLang('en', document.getElementById('flag-en'));
    const savedUser = localStorage.getItem('7studios_user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('login-overlay').style.display = 'none';
        trackPresence(); // تفعيل الـ Online فوراً لو مسجل قبل كدة
    }
};

function enterSite() {
  const name = document.getElementById('user-full-name').value.trim();
  if (name.split(' ').filter(w => w !== '').length < 2) {
    alert("Please enter at least your first and last name.");
    return;
  }
  currentUser = { displayName: name };
  localStorage.setItem('7studios_user', JSON.stringify(currentUser));
  document.getElementById('login-overlay').style.display = 'none';
  trackPresence(); // تفعيل الـ Online فور الضغط على الزر
}

function trackPresence() {
  if (!currentUser) return;
  const onlineRef = database.ref('online_users');
  const myRef = onlineRef.push();
  
  // يمسحه لما يقفل الصفحة
  myRef.onDisconnect().remove();
  myRef.set({ name: currentUser.displayName, time: Date.now() });

  onlineRef.on('value', s => {
    const now = new Date();
    const min = now.getMinutes();
    const hrs = now.getHours();
    
    // رقم أساسي واقعي يتغير كل دقيقة
    let dynamicBase = 115 + (min % 20) + (hrs % 8); 
    
    // المجموع = الرقم الوهمي + عدد المتصلين الحقيقيين (منهم أنت)
    const realUsersCount = s.numChildren() || 0;
    document.getElementById('online-count').textContent = dynamicBase + realUsersCount;
  });
}

const translations = {
  en: { sectionTitle: "DESIGNS", contactTitle: "Contact Us", postBtn: "Post", placeholder: "Add a comment...", noComments: "No comments yet..." },
  ar: { sectionTitle: "التصاميم", contactTitle: "تواصل معنا", postBtn: "نشر", placeholder: "أضف تعليقاً...", noComments: "لا توجد تعليقات بعد..." },
  es: { sectionTitle: "DISEÑOS", contactTitle: "Contáctenos", postBtn: "Publicar", placeholder: "Añadir un comentario...", noComments: "Sin comentarios aún..." }
};

function changeLang(lang, el) {
  currentLang = lang;
  document.getElementById('commentsList').style.textAlign = (lang === 'ar') ? 'right' : 'left';
  document.getElementById('section-title').textContent = translations[lang].sectionTitle;
  document.getElementById('contact-title').textContent = translations[lang].contactTitle;
  document.getElementById('post-btn').textContent = translations[lang].postBtn;
  document.getElementById('commentInput').placeholder = translations[lang].placeholder;
  document.querySelectorAll('.lang-flag').forEach(f => f.classList.remove('active'));
  if(el) el.classList.add('active');
}

const imagesLinks = [
  "https://i.postimg.cc/66FQhPbY/Photo-Pea-cdccd85d-cd41-45c8-880b-1f119fcbcd31.jpg",
  "https://i.postimg.cc/LXnHtkzk/F-20250821-022511-0000.png",
  "https://i.postimg.cc/tCh9N4x9/F-20250821-023820-0000.png",
  "https://i.postimg.cc/kXJT35TJ/Gold-Luxury-Initial-Logo-20250807-054018-0000.png",
  "https://i.postimg.cc/15fFYp2H/Black-White-Minimalist-Professional-Initial-Logo-20250921-171006-0000.png",
  "https://i.postimg.cc/Y2fkKZKh/lwjw-aswd-w-byj-bsyt-dykwr-w-tsmym-20260310-172746-0000.png",
  "https://i.postimg.cc/3rgpM8x9/nady-alrjal-alsry-20260223-033943-0000.png",
  "https://i.postimg.cc/7LKjTxKP/pixel-20260319-060426-0000.png"
];

let currentIndex = 0;
let lastTapTime = 0;
let touchStartX = 0;
let likedStatus = JSON.parse(localStorage.getItem('7studios_likes')) || new Array(8).fill(false);

const gallery = document.getElementById('gallery');
imagesLinks.forEach((src, index) => {
  const img = document.createElement('img');
  img.src = src;
  img.onclick = () => openImage(index);
  gallery.appendChild(img);
});

function openImage(i) {
  currentIndex = i;
  updatePopup();
  document.getElementById("langSwitcher").style.display = "none"; 
  document.getElementById("popup").style.display = "flex";
  setTimeout(() => document.getElementById("popup").style.opacity = "1", 10);
  syncFirebaseData(i);
}

function syncFirebaseData(i) {
  database.ref('likes/photo_' + i).on('value', (s) => document.getElementById("likeCountDisplay").textContent = s.val() || 0);
  database.ref('comments/photo_' + i).on('value', (snapshot) => {
      const list = document.getElementById("commentsList");
      list.innerHTML = "";
      const data = snapshot.val();
      if(data) {
          Object.values(data).forEach(comment => {
              const div = document.createElement("div");
              div.className = "comment-item";
              div.innerHTML = `<span class="comment-user-name">${comment.user}:</span> ${comment.text}`;
              list.appendChild(div);
          });
      } else {
          list.innerHTML = `<div style="font-size:12px; opacity:0.5; height:52px; display:flex; align-items:center; justify-content:center;">${translations[currentLang].noComments}</div>`;
      }
      list.scrollTop = list.scrollHeight;
  });
}

function closeImage() {
  document.getElementById("popup").style.opacity = "0";
  document.getElementById("langSwitcher").style.display = "flex";
  setTimeout(() => document.getElementById("popup").style.display = "none", 500);
}

function addComment() {
  const input = document.getElementById("commentInput");
  if(input.value.trim() !== "" && currentUser) {
    database.ref('comments/photo_' + currentIndex).push({ user: currentUser.displayName, text: input.value });
    input.value = "";
  }
}

function toggleLike() {
  if (!currentUser) return;
  const wasLiked = likedStatus[currentIndex];
  likedStatus[currentIndex] = !likedStatus[currentIndex];
  localStorage.setItem('7studios_likes', JSON.stringify(likedStatus));
  database.ref('likes/photo_' + currentIndex).transaction(v => (v || 0) + (wasLiked ? -1 : 1));
  database.ref('whoLiked/photo_' + currentIndex).push(currentUser.displayName);
  updatePopup();
  if (likedStatus[currentIndex]) {
    const heart = document.getElementById("bigHeart");
    heart.classList.add("show");
    setTimeout(() => heart.classList.remove("show"), 800);
  }
}

function updatePopup() {
  document.getElementById("popup-img").src = imagesLinks[currentIndex];
  document.getElementById("likeBtn").className = likedStatus[currentIndex] ? "fas fa-heart liked" : "fas fa-heart";
}

const swipeArea = document.getElementById("swipe-protection");
swipeArea.addEventListener("touchstart", (e) => { touchStartX = e.touches[0].clientX; });
swipeArea.addEventListener("touchend", (e) => {
  let touchEndX = e.changedTouches[0].clientX;
  if (touchStartX - touchEndX > 50) { currentIndex = (currentIndex + 1) % imagesLinks.length; updatePopup(); syncFirebaseData(currentIndex); } 
  else if (touchEndX - touchStartX > 50) { currentIndex = (currentIndex - 1 + imagesLinks.length) % imagesLinks.length; updatePopup(); syncFirebaseData(currentIndex); }
});
swipeArea.addEventListener("click", (e) => {
  const currentTime = new Date().getTime();
  if (currentTime - lastTapTime < 300) { toggleLike(); }
  lastTapTime = currentTime;
});

function downloadImage() { const a = document.createElement('a'); a.href = imagesLinks[currentIndex]; a.download = '7_STUDIOS.png'; a.click(); }
function shareImage() { if (navigator.share) navigator.share({ url: imagesLinks[currentIndex] }); }

const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let stars = [];
for(let i=0; i<80; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2, v: Math.random()*0.4});
function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(255,215,0,0.3)";
  stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill(); s.y -= s.v; if(s.y < 0) s.y = canvas.height; });
  requestAnimationFrame(drawStars);
}
drawStars();
</script>
</body>
</html>
